<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Redirect to index.html, preserving the path as a query param
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = path.slice(1) + (search ? '&q=' + search.slice(1) : '') + hash;
      window.location.replace(
        window.location.origin + '/final-project-l1_group_23/?redirect=' + encodeURIComponent(redirect)
      );
    </script>
  </head>
  <body></body>
</html>
