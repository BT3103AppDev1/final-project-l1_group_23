<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanteenPulse | Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="nav-container">
            <div class="brand">
                <div class="nus-box">NUS</div>
                <span class="brand-name">CanteenPulse</span>
            </div>
            <nav class="top-nav">
                <a href="#" class="active"><i class="fas fa-users"></i> Community</a>
                <a href="#"><i class="fas fa-map-marker-alt"></i> Map</a>
                <a href="#"><i class="fas fa-star"></i> Recommended</a>
                <a href="#"><i class="fas fa-heart"></i> Favourites</a>
                <a href="#"><i class="fas fa-gift"></i> Rewards</a>
            </nav>
            <div class="user-actions">
                <i class="fas fa-cog"></i>
                <span><i class="fas fa-sign-out-alt"></i> Logout</span>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="hero-section">
            <h1>Hey there, <span class="orange-text">NUS!</span></h1>
            <p>Let's find you the best spot to eat ⭐</p>
            <div class="lion-status">
                <div class="speech">Hungry? Let's go!</div>
                <img src="https://i.ibb.co/6PjCq4x/nus-lion-logo.png" alt="Lion" class="lion-img">
            </div>
        </section>

        <div class="search-area">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search canteens, food, or location...">
                <button class="btn-search">Search</button>
            </div>
        </div>

        <div class="filter-chips">
            <button class="chip active"><i class="fas fa-utensils"></i> All Canteens</button>
            <button class="chip">Lowest Crowd <i class="fas fa-chevron-down"></i></button>
            <button class="chip">All Levels <i class="fas fa-chevron-down"></i></button>
        </div>

        <div class="canteen-grid">
            <div class="card">
                <div class="card-img">
                    <img src="Img/pgp.jpg" alt="PGP">
                    <div class="overlay-icons">
                        <span class="icon-circle heart"><i class="fas fa-heart"></i></span>
                        <span class="icon-circle"><i class="fas fa-cog"></i></span>
                    </div>
                </div>
                <div class="card-body">
                    <h3>PGP Aircon Canteen</h3>
                    <div class="stats-row">
                        <span class="crowd-label"><span class="dot green"></span> Low Crowd (16%)</span>
                        <span class="fraction">50 / 308</span>
                    </div>
                    <div class="progress-bg"><div class="progress-bar green-bar" style="width: 16%;"></div></div>
                    <p class="time-stamp">Updated 18 minutes ago</p>
                </div>
            </div>

            <div class="card">
                <div class="card-img">
                    <img src="Img/Frontier.jpg" alt="Frontier">
                    <div class="overlay-icons">
                        <span class="icon-circle heart"><i class="fas fa-heart"></i></span>
                        <span class="icon-circle"><i class="fas fa-cog"></i></span>
                    </div>
                </div>
                <div class="card-body">
                    <h3>Frontier</h3>
                    <div class="stats-row">
                        <span class="crowd-label"><span class="dot green"></span> Low Crowd (21%)</span>
                        <span class="fraction">150 / 700</span>
                    </div>
                    <div class="progress-bg"><div class="progress-bar green-bar" style="width: 21%;"></div></div>
                    <p class="time-stamp">Updated about 4 hours ago</p>
                </div>
            </div>

            </div>
    </main>
</body>
</html>
